<style>
  #bbsw-committee * { box-sizing: border-box; }

  #bbsw-committee {
    font-family: inherit;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .bbsw-section-heading {
    font-size: 1.1em;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #c0392b;
    border-bottom: 2px solid #c0392b;
    padding-bottom: 6px;
    margin: 40px 0 24px;
  }

  .bbsw-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 28px 20px;
    margin-bottom: 16px;
  }

  .bbsw-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .bbsw-card img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top center;
    margin-bottom: 10px;
    background: #eee;
  }

  .bbsw-card .bbsw-name {
    font-size: 0.85em;
    font-weight: 700;
    color: #222;
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .bbsw-card a.bbsw-name {
    color: #c0392b;
    text-decoration: none;
  }

  .bbsw-card a.bbsw-name:hover {
    text-decoration: underline;
  }

  .bbsw-card .bbsw-role {
    font-size: 0.75em;
    color: #555;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .bbsw-card .bbsw-affiliation {
    font-size: 0.72em;
    color: #888;
    line-height: 1.3;
  }

  .bbsw-role-heading {
    font-size: 0.9em;
    font-weight: 700;
    color: #444;
    margin: 28px 0 14px;
    padding-left: 4px;
    border-left: 3px solid #c0392b;
    padding-left: 10px;
  }

  #bbsw-committee p.bbsw-loading {
    color: #888;
    font-style: italic;
  }
</style>

<div id="bbsw-committee">
  <p class="bbsw-loading">Loading committee&hellip;</p>
</div>

<script>
(function () {
  var GITHUB_RAW = 'https://raw.githubusercontent.com/YannanTang/bbsw-website/main/';
  var JSON_URL   = GITHUB_RAW + 'committee/committee.json';

  function nameEl(member) {
    var text = member.name;
    if (member.profileUrl) {
      return '<a class="bbsw-name" href="' + member.profileUrl + '">' + text + '</a>';
    }
    return '<span class="bbsw-name">' + text + '</span>';
  }

  function card(member) {
    var imgSrc = GITHUB_RAW + member.photo;
    return (
      '<div class="bbsw-card">' +
        '<img src="' + imgSrc + '" alt="' + member.name + '" loading="lazy">' +
        nameEl(member) +
        '<span class="bbsw-role">' + member.role + '</span>' +
        (member.affiliation ? '<span class="bbsw-affiliation">' + member.affiliation + '</span>' : '') +
      '</div>'
    );
  }

  function groupByRole(members) {
    var order = [];
    var groups = {};
    members.forEach(function (m) {
      if (!groups[m.role]) {
        groups[m.role] = [];
        order.push(m.role);
      }
      groups[m.role].push(m);
    });
    return { order: order, groups: groups };
  }

  fetch(JSON_URL)
    .then(function (r) { return r.json(); })
    .then(function (members) {
      var steering = members.filter(function (m) { return m.committee === 'Steering Committee'; });
      var regular  = members.filter(function (m) { return m.committee === 'Committee Members'; });
      var grouped  = groupByRole(regular);

      var html = '';

      // Steering Committee
      html += '<div class="bbsw-section-heading">Steering Committee</div>';
      html += '<div class="bbsw-grid">';
      steering.forEach(function (m) { html += card(m); });
      html += '</div>';

      // Committee Members grouped by role
      html += '<div class="bbsw-section-heading">Committee Members</div>';
      grouped.order.forEach(function (role) {
        html += '<div class="bbsw-role-heading">' + role + '</div>';
        html += '<div class="bbsw-grid">';
        grouped.groups[role].forEach(function (m) { html += card(m); });
        html += '</div>';
      });

      document.getElementById('bbsw-committee').innerHTML = html;
    })
    .catch(function () {
      document.getElementById('bbsw-committee').innerHTML =
        '<p style="color:#c0392b;">Could not load committee data. Please try refreshing.</p>';
    });
}());
</script>
